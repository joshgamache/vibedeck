<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Slate Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#161625"/>
      <stop offset="70%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    
    <!-- Gold/Amber Glow Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0b855"/>
      <stop offset="50%" stop-color="#d4943a"/>
      <stop offset="100%" stop-color="#a06820"/>
    </linearGradient>

    <!-- Amber Glow Radial -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d4943a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4943a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background (Circular for standalone/maskable consistency) -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  
  <!-- Ambient Inner Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glowGrad)"/>

  <!-- Outer Runic Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8 6" stroke-opacity="0.6"/>

  <!-- Center Card Deck Portal Symbol -->
  <g transform="translate(256, 256)">
    <!-- Back Card (Shadowed & Angled) -->
    <rect x="-60" y="-85" width="120" height="170" rx="8" fill="#12121e" stroke="url(#goldGrad)" stroke-width="2" transform="rotate(-15)" stroke-opacity="0.5"/>
    <!-- Middle Card (Angled opposite) -->
    <rect x="-60" y="-85" width="120" height="170" rx="8" fill="#1c1c2e" stroke="url(#goldGrad)" stroke-width="2" transform="rotate(10)" stroke-opacity="0.8"/>
    <!-- Front Card (Centered) -->
    <rect x="-60" y="-85" width="120" height="170" rx="8" fill="#0f0f1a" stroke="url(#goldGrad)" stroke-width="3"/>
    
    <!-- Front Card Details (Runic Eye/Spark) -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="4 2"/>
    
    <!-- Central Runic Star/Spark -->
    <path d="M 0,-18 L 4,-4 L 18,0 L 4,4 L 0,18 L -4,4 L -18,0 L -4,-4 Z" fill="url(#goldGrad)"/>
    <circle cx="0" cy="0" r="3" fill="#e8e4d8"/>
    
    <!-- Card Border Accents -->
    <rect x="-50" y="-75" width="100" height="150" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <!-- Glowing Corner Ornaments -->
  <circle cx="76" cy="76" r="6" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="436" cy="76" r="6" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="76" cy="436" r="6" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="436" cy="436" r="6" fill="url(#goldGrad)" opacity="0.6"/>
</svg>
